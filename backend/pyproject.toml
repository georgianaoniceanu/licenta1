    "scikit-learn (>=1.5,<2.0)",
    "numpy (>=2.0,<3.0)",
    "joblib (>=1.4,<2.0)",
    # Speech/phoneme + prosody
    "pronouncing (>=0.3.0,<0.4.0)",
    "librosa (>=0.11.0,<0.12.0)",
    # External services + auth
    "groq (>=1.1.2,<2.0.0)",
    "firebase-admin (>=7.3.0,<8.0.0)",
    "requests (>=2.32,<3.0)"
